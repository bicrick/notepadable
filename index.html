<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <meta name="description" content="A minimalist text editor that encodes your entire document into the URL. No server, no database, no accounts.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23171717'/><text x='50' y='68' font-size='52' font-family='system-ui' font-weight='700' fill='white' text-anchor='middle'>T</text></svg>">
  <title>notepadable — text stored in the URL</title>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">
      <span class="nav-name"><strong>notepad</strong><span class="nav-name-muted">able</span></span>
    </a>
    <div class="nav-actions">
      <a href="/docs" class="btn btn-ghost">Docs</a>
      <a href="https://github.com/bicrick/notepadable" target="_blank" rel="noopener" class="btn btn-ghost">GitHub</a>
      <a href="/app" class="btn btn-outline">Open editor</a>
    </div>
    <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false">
      <svg class="nav-hamburger-icon nav-hamburger-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
      <svg class="nav-hamburger-icon nav-hamburger-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </nav>
  <div class="nav-mobile-overlay" aria-hidden="true">
    <div class="nav-mobile-menu">
      <a href="/docs" class="nav-mobile-link">Docs</a>
      <a href="https://github.com/bicrick/notepadable" target="_blank" rel="noopener" class="nav-mobile-link">GitHub</a>
      <a href="/app" class="nav-mobile-link nav-mobile-link--primary">Open editor</a>
    </div>
  </div>

  <main class="landing-main">
    <section class="hero-row">
      <div class="hero">
        <h1 class="hero-headline">Your text,<br>encoded in the URL.</h1>
        <div class="hero-actions">
          <a href="/app" class="btn btn-primary">Open editor</a>
          <a href="/docs" class="btn btn-ghost">Docs</a>
        </div>
      </div>

      <div class="demo-section">
        <div class="demo-window">
          <div class="demo-content">
            <div class="demo-text" id="demo-text"></div>
          </div>
          <div class="demo-bar">
            <span class="demo-bar-brand">notepad<span class="demo-bar-faint">able</span></span>
            <a class="demo-bar-url demo-bar-url--disabled" id="demo-bar-url" href="/app#">notepadable.com/app#</a>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <span>Made by <a href="https://github.com/bicrick" target="_blank" rel="noopener">Bicrick</a></span>
    <span class="footer-sep">&middot;</span>
    <a href="https://github.com/bicrick/notepadable" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">&middot;</span>
    <a href="/docs">Docs</a>
    <span class="footer-sep">&middot;</span>
    <a href="/app">Open editor</a>
  </footer>

  <script type="module" src="/src/landing.ts"></script>

</html>
